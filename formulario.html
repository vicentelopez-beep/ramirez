<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="formulario.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body>
    <h1>Formulario de Contacto</h1>
    <form action="" class="formulario">
        <label for="nombre">Nombre Completo</label>
        <input type="text" required>
        <label for="correo">Correo Electrónico</label>
        <input type="email" name="correo" id="" required>
        <label for="password">Password</label>
        <input type="password" name="" id="" required>
        <label for="edad">Edad</label>
        <input type="number" name="edad" id="" required>
        <label for="">Fecha</label>
        <input type="date" name="" id="">
        <label for="Comentarios">Escribe tu queja o sugerencia</label>
        <textarea name="" id="" required></textarea>
        
        <div class="contenedor">
            <label for="sexo">Sexo:</label><br>
            <input type="radio" name="" id="">Mujer<br>                           
            <input type="radio" name="" id="">Hombre
        </div>

        <div class="marcas">
              <label for="Marcas">Marcas de tu interés:</label><br>
              <input type="checkbox" name="" id="">Ford<br>
              <input type="checkbox" name="" id="">Chevrolet<br>
              <input type="checkbox" name="" id="">Porsche<br>
              <input type="checkbox" name="" id="">Ferrari<br>
              <input type="checkbox" name="" id="">Alfa Romeo<br>
              <input type="checkbox" name="" id="">Bugatti<br>
        </div>
              <input type="submit" value="Enviar" class="boton">
              <input type="reset" value="Limpiar" class="boton">
    </form>
    
    <div>
    <h3><a href="index.html"> Regresar a Home</a></h3>
    </div>
    
</body>
</html>
